<div class="container mt-4">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Feedback Form</h4>
    </div>
    <div class="card-body">
        <form [formGroup]="feedbackForm">
        <div class="row">
            <div class="col-md-6 mb-3">
            <label class="form-label">Candidate Name</label>
            <input 
                type="text" 
                class="form-control" 
                formControlName="candidateName" [value]="candidateName"
                readonly>
            </div>
            <div class="col-md-6 mb-3">
            <label class="form-label">Round</label>
            <select class="form-select" formControlName="round">
                <option value="">Select Round</option>
                <option value="HR">HR</option>
                <option value="Technical">Technical</option>
                <option value="Manager">Manager</option>
            </select>
            </div>
            <div class="col-md-6 mb-3">
            <label class="form-label d-block">Rating</label>

            <div class="rating-stars">
                <i 
                *ngFor="let star of [1,2,3,4,5]" 
                class="bi"
                [ngClass]="star <= feedbackForm.get('rating')?.value ? 'bi-star-fill text-warning' : 'bi-star text-secondary'"
                (click)="setRating(star)"
                style="font-size: 1.5rem; cursor: pointer; margin-right: 5px;">
                </i>
            </div>
            <input type="hidden" formControlName="rating">
            </div>
            <div class="col-md-6 mb-3">
            <label class="form-label">Result</label>
            <select class="form-select" formControlName="result">
                <option value="">Select Result</option>
                <option value="NEXT_ROUND">Next Round</option>
                <option value="REJECTED">Rejected</option>
                <option value="SELECTED">Selected</option>
            </select>
            </div>
            <div class="col-md-12 mb-3">
            <label class="form-label">Feedback</label>
            <textarea 
                class="form-control" 
                rows="4" 
                formControlName="feedback"
                placeholder="Enter detailed feedback..."></textarea>
            </div>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="reset" class="btn btn-secondary">Reset</button>
            <button type="submit" class="btn btn-success" (click)="submitFeedback()">Submit Feedback</button>
        </div>

        </form>
    </div>
</div>
